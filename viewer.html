<script type="module">

import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  35,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.HemisphereLight(0xffffff, 0x777777, 2));

const key = new THREE.DirectionalLight(0xffffff, 3);
key.position.set(3, 5, 4);
scene.add(key);

const fill = new THREE.DirectionalLight(0xffffff, 1.5);
fill.position.set(-3, -2, 2);
scene.add(fill);

// Model
const loader = new GLTFLoader();

let pencil;
let targetX = 0;
let targetZ = 0;

loader.load(
  './pencil%20for%20web.glb',

  (gltf) => {

    pencil = gltf.scene;
    scene.add(pencil);

    // Centre model
    const box = new THREE.Box3().setFromObject(pencil);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    pencil.position.set(
      -center.x,
      -center.y - 0.35, // <-- lowers the pencil
      -center.z
    );

    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2.4 / maxDim;
    pencil.scale.setScalar(scale);

  }
);

// Mouse
window.addEventListener('mousemove', (e) => {

  targetX = (e.clientY / window.innerHeight - 0.5) * 0.08;
  targetZ = (e.clientX / window.innerWidth - 0.5) * 0.08;

});

const clock = new THREE.Clock();

function animate() {

  requestAnimationFrame(animate);

  if (pencil) {

    const t = clock.getElapsedTime();

    // Slow spin
    pencil.rotation.y = t * 0.35;

    // Smooth mouse tilt
    pencil.rotation.x += (targetX - pencil.rotation.x) * 0.05;
    pencil.rotation.z += (targetZ - pencil.rotation.z) * 0.05;

    // Gentle bob
    pencil.position.y += ((Math.sin(t * 1.4) * 0.05) - pencil.position.y) * 0.05;

  }

  renderer.render(scene, camera);

}

animate();

window.addEventListener('resize', () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>
