<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pencil Viewer</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}
canvas{display:block;}
</style>
</head>
<body>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.168.0/build/three.module.js";
import { GLTFLoader } from "https://unpkg.com/three@0.168.0/examples/jsm/loaders/GLTFLoader.js";

const MODEL_URL = "./pencil%20for%20web.glb";

// -------- SETTINGS --------
const ROTATION_SPEED = 0.35;
const FLOAT_AMOUNT = 0.05;
const FLOAT_SPEED = 1.3;
const Y_OFFSET = 0;
const MOUSE_TILT = 0.12;
// --------------------------

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
35,
window.innerWidth/window.innerHeight,
0.01,
1000
);

const renderer = new THREE.WebGLRenderer({
alpha:true,
antialias:true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.HemisphereLight(0xffffff,0x888888,2.2));

const key = new THREE.DirectionalLight(0xffffff,3.5);
key.position.set(5,8,6);
scene.add(key);

const fill = new THREE.DirectionalLight(0xffffff,1.4);
fill.position.set(-5,2,-4);
scene.add(fill);

// Pivot for animation
const pivot = new THREE.Group();
scene.add(pivot);

let model;
let baseY = -0.5;

const loader = new GLTFLoader();

loader.load(
MODEL_URL,
(gltf)=>{

    model = gltf.scene;
    pivot.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);

    // recompute after centering
    const centeredBox = new THREE.Box3().setFromObject(model);
    const sphere = centeredBox.getBoundingSphere(new THREE.Sphere());

    const radius = sphere.radius;

    const fov = THREE.MathUtils.degToRad(camera.fov);
    const distance = radius / Math.sin(fov/2);

    camera.position.set(0,0,distance*1.25);
    camera.lookAt(0,0,0);

    baseY = Y_OFFSET;

},
undefined,
(err)=>console.error(err)
);

const mouse={x:0,y:0,tx:0,ty:0};

window.addEventListener("mousemove",(e)=>{
    mouse.tx=(e.clientX/window.innerWidth-0.5)*MOUSE_TILT;
    mouse.ty=(e.clientY/window.innerHeight-0.5)*MOUSE_TILT;
});

const clock=new THREE.Clock();

function animate(){

    requestAnimationFrame(animate);

    mouse.x += (mouse.tx-mouse.x)*0.06;
    mouse.y += (mouse.ty-mouse.y)*0.06;

    if(model){

        const t=clock.getElapsedTime();

        pivot.rotation.y=t*ROTATION_SPEED;
        pivot.rotation.x=mouse.y;
        pivot.rotation.z=mouse.x;

        pivot.position.y=baseY+Math.sin(t*FLOAT_SPEED)*FLOAT_AMOUNT;

    }

    renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);

});
</script>

</body>
</html>
