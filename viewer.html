<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Viewer</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
}

canvas {
    display: block;
}
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.168.0/build/three.module.js";
import { GLTFLoader } from "https://unpkg.com/three@0.168.0/examples/jsm/loaders/GLTFLoader.js";

////////////////////////////////////////////////////////
// Scene
////////////////////////////////////////////////////////

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    35,
    window.innerWidth / window.innerHeight,
    0.1,
    100
);

camera.position.set(0, 0, 5);

////////////////////////////////////////////////////////
// Renderer
////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({
    alpha: true,
    antialias: true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(renderer.domElement);

////////////////////////////////////////////////////////
// Lighting
////////////////////////////////////////////////////////

scene.add(new THREE.AmbientLight(0xffffff, 2));

const keyLight = new THREE.DirectionalLight(0xffffff, 3);
keyLight.position.set(5, 5, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 1.5);
fillLight.position.set(-4, 2, -2);
scene.add(fillLight);

////////////////////////////////////////////////////////
// Mouse
////////////////////////////////////////////////////////

const mouse = {
    x: 0,
    y: 0,
    targetX: 0,
    targetY: 0
};

window.addEventListener("mousemove", (e) => {

    mouse.targetX = (e.clientX / window.innerWidth - 0.5) * 0.2;
    mouse.targetY = (e.clientY / window.innerHeight - 0.5) * 0.15;

});

////////////////////////////////////////////////////////
// Load Model
////////////////////////////////////////////////////////

let pencil;

const loader = new GLTFLoader();

loader.load(

    "./pencil%20for%20web.glb",

    (gltf) => {

        console.log("Model Loaded");

        pencil = gltf.scene;
        scene.add(pencil);

        const box = new THREE.Box3().setFromObject(pencil);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        pencil.position.sub(center);

        const maxDimension = Math.max(size.x, size.y, size.z);
        const scale = 2.2 / maxDimension;

        pencil.scale.setScalar(scale);

    },

    undefined,

    (error) => {

        console.error(error);

    }

);

////////////////////////////////////////////////////////
// Animation
////////////////////////////////////////////////////////

const clock = new THREE.Clock();

function animate() {

    requestAnimationFrame(animate);

    if (pencil) {

        const t = clock.getElapsedTime();

        mouse.x += (mouse.targetX - mouse.x) * 0.05;
        mouse.y += (mouse.targetY - mouse.y) * 0.05;

        // Rotation
        pencil.rotation.y = t * 0.35;
        pencil.rotation.x = mouse.y;
        pencil.rotation.z = mouse.x;

        // Floating
        pencil.position.y += ((Math.sin(t * 1.4) * 0.05) - pencil.position.y) * 0.05;

    }

    renderer.render(scene, camera);

}

animate();

////////////////////////////////////////////////////////
// Resize
////////////////////////////////////////////////////////

window.addEventListener("resize", () => {

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>

</body>
</html>
