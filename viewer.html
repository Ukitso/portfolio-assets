<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pencil Viewer</title>

<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

canvas{
    display:block;
}

</style>

<script type="importmap">
{
    "imports":{
        "three":"https://unpkg.com/three@0.168.0/build/three.module.js",
        "three/addons/":"https://unpkg.com/three@0.168.0/examples/jsm/"
    }
}
</script>

</head>

<body>

<script type="module">

import * as THREE from "three";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";

/////////////////////////////////////////////////////////
// Scene
/////////////////////////////////////////////////////////

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
35,
window.innerWidth/window.innerHeight,
0.1,
100
);

camera.position.set(0,0,5);

/////////////////////////////////////////////////////////
// Renderer
/////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({
alpha:true,
antialias:true
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(renderer.domElement);

/////////////////////////////////////////////////////////
// Lights
/////////////////////////////////////////////////////////

scene.add(
new THREE.AmbientLight(
0xffffff,
1.6
)
);

const key = new THREE.DirectionalLight(
0xffffff,
3
);

key.position.set(5,5,5);

scene.add(key);

const rim = new THREE.DirectionalLight(
0xffffff,
1.5
);

rim.position.set(-4,3,-4);

scene.add(rim);

/////////////////////////////////////////////////////////
// Mouse
/////////////////////////////////////////////////////////

const mouse = {
x:0,
y:0,
targetX:0,
targetY:0
};

window.addEventListener("mousemove",(e)=>{

mouse.targetX =
(e.clientX/window.innerWidth-.5)*0.25;

mouse.targetY =
(e.clientY/window.innerHeight-.5)*0.15;

});

/////////////////////////////////////////////////////////
// Model
/////////////////////////////////////////////////////////

let pencil;

const loader = new GLTFLoader();

loader.load(

"./pencil%20for%20web.glb",

(gltf)=>{

console.log("Loaded.");

pencil = gltf.scene;

scene.add(pencil);

const box = new THREE.Box3().setFromObject(pencil);

const size = box.getSize(new THREE.Vector3());

const center = box.getCenter(new THREE.Vector3());

pencil.position.sub(center);

const maxDimension = Math.max(
size.x,
size.y,
size.z
);

const desiredSize = 2.2;

const scale = desiredSize/maxDimension;

pencil.scale.setScalar(scale);

},

undefined,

(error)=>{

console.error(error);

}

);

/////////////////////////////////////////////////////////
// Animation
/////////////////////////////////////////////////////////

const clock = new THREE.Clock();

function animate(){

requestAnimationFrame(animate);

if(pencil){

const t = clock.getElapsedTime();

mouse.x += (mouse.targetX-mouse.x)*0.05;
mouse.y += (mouse.targetY-mouse.y)*0.05;

// Rotation

pencil.rotation.y = t*0.35;

pencil.rotation.x = mouse.y;

pencil.rotation.z = mouse.x;

// Floating

pencil.position.y +=
(
Math.sin(t*1.3)*0.05
-
pencil.position.y
)*0.05;

}

renderer.render(scene,camera);

}

animate();

/////////////////////////////////////////////////////////
// Resize
/////////////////////////////////////////////////////////

window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
