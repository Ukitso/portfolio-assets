<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pencil Viewer</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:transparent;
}

canvas{
display:block;
}
</style>

<script type="importmap">
{
  "imports": {
    "three":"https://unpkg.com/three@0.168.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.168.0/examples/jsm/"
  }
}
</script>

</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.168.0/build/three.module.js";
import { GLTFLoader } from "https://unpkg.com/three@0.168.0/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
35,
window.innerWidth/window.innerHeight,
0.1,
100
);

camera.position.set(0,0,5);

const renderer = new THREE.WebGLRenderer({
alpha:true,
antialias:true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(renderer.domElement);

const hemi = new THREE.HemisphereLight(
0xffffff,
0x888888,
2
);

scene.add(hemi);

const key = new THREE.DirectionalLight(
0xffffff,
3
);

key.position.set(3,5,4);
scene.add(key);

const fill = new THREE.DirectionalLight(
0xffffff,
1.5
);

fill.position.set(-3,-2,2);
scene.add(fill);

const loader = new GLTFLoader();

let pencil;

loader.load(

'./pencil%20for%20web.glb',

(gltf)=>{

pencil = gltf.scene;

scene.add(pencil);

const box = new THREE.Box3().setFromObject(pencil);
const center = box.getCenter(new THREE.Vector3());

pencil.position.sub(center);

const size = box.getSize(new THREE.Vector3()).length();

const scale = 3/size;

pencil.scale.setScalar(scale);

}

);

const mouse={
x:0,
y:0
};

window.addEventListener("mousemove",(e)=>{

mouse.x=(e.clientX/window.innerWidth-.5)*0.15;
mouse.y=(e.clientY/window.innerHeight-.5)*0.15;

});

const clock = new THREE.Clock();

function animate(){

requestAnimationFrame(animate);

if(pencil){

const t = clock.getElapsedTime();

pencil.rotation.y=t*0.4;

pencil.rotation.x=mouse.y;

pencil.rotation.z=mouse.x;

pencil.position.y=Math.sin(t*1.5)*0.05;

}

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
